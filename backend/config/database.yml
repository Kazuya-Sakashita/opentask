default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DB_PORT", 5433) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "password") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "opentask_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_TEST_NAME", "opentask_test") %>

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "opentask_production") %>

  cache:
    <<: *primary_production
    database: <%= ENV.fetch("DB_CACHE_NAME", "opentask_production_cache") %>
    migrations_paths: db/cache_migrate

  queue:
    <<: *primary_production
    database: <%= ENV.fetch("DB_QUEUE_NAME", "opentask_production_queue") %>
    migrations_paths: db/queue_migrate

  cable:
    <<: *primary_production
    database: <%= ENV.fetch("DB_CABLE_NAME", "opentask_production_cable") %>
    migrations_paths: db/cable_migrate
